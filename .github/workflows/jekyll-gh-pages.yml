name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # 监听 main 分支的推送，如果你的默认分支是 master，请相应修改

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: '24' # 指定 Node.js 版本
          cache: 'npm'       # 启用 npm 缓存以加速安装

      - name: Install dependencies 📦
        run: npm ci

      - name: Build 🏗️
        run: npm run build

      - name: Deploy to GitHub Pages 🚀
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/main' # 确保只在 main 分支部署
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out # 部署由 Next.js 生成的 'out' 目录
